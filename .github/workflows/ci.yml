name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  headers:
    name: License + AI-notice headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every code file has SPDX + AI-notice headers
        run: |
          missing=0
          while IFS= read -r f; do
            if ! head -10 "$f" | grep -q "SPDX-License-Identifier"; then
              echo "MISSING SPDX header: $f"
              missing=1
            fi
            if ! head -10 "$f" | grep -q "generated by AI"; then
              echo "MISSING AI-notice header: $f"
              missing=1
            fi
          done < <(find portauth-engine portauth-issuer sdks state-authority-ref conformance opa portauth-db tests -type f \
                     \( -name '*.js' -o -name '*.py' -o -name '*.sh' -o -name '*.sql' -o -name '*.rego' \) \
                     -not -path '*/node_modules/*' 2>/dev/null)
          exit "$missing"

  unit-tests:
    name: Unit tests (engine + issuer + preflight)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install engine deps
        working-directory: portauth-engine
        run: npm ci || npm install

      - name: Run engine tests
        working-directory: portauth-engine
        run: npm test

      - name: Install issuer deps
        working-directory: portauth-issuer
        run: npm ci || npm install

      - name: Run issuer tests
        working-directory: portauth-issuer
        run: npm test

      - name: Install preflight SDK deps
        working-directory: sdks/preflight
        run: npm install

      - name: Run preflight SDK tests
        working-directory: sdks/preflight
        run: npm test

  conformance:
    name: Conformance vectors
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install engine deps (for evaluator)
        working-directory: portauth-engine
        run: npm ci || npm install

      - name: Run conformance corpus
        working-directory: conformance
        run: node run-conformance.js

  e2e-smoke:
    name: End-to-end smoke (docker compose)
    runs-on: ubuntu-latest
    needs: unit-tests
    services: {}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python (for jq alternative + curl pipeline)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Bring up the compose stack
        run: docker compose -f portauth-docker-compose.yml up -d --build

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/health \
                && curl -sf http://localhost:3200/health; then
              echo "services healthy"
              exit 0
            fi
            sleep 2
          done
          echo "services never became healthy"
          docker compose -f portauth-docker-compose.yml logs --tail=200
          exit 1

      - name: Run end-to-end smoke
        env:
          ISSUER_URL: http://localhost:3100
          ENGINE_URL: http://localhost:3200
          ISSUER_ID_FOR_ENGINE: http://portauth-issuer:3100
          ISSUER_JWKS_URI: http://portauth-issuer:3100/.well-known/jwks.json
        run: ./portauth-engine/test/e2e-smoke.sh

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f portauth-docker-compose.yml logs --tail=400

      - name: Tear down compose
        if: always()
        run: docker compose -f portauth-docker-compose.yml down -v

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  headers:
    name: License + AI-notice headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every code file has SPDX + AI-notice headers
        run: |
          missing=0
          while IFS= read -r f; do
            if ! head -10 "$f" | grep -q "SPDX-License-Identifier"; then
              echo "MISSING SPDX header: $f"
              missing=1
            fi
            if ! head -10 "$f" | grep -q "generated by AI"; then
              echo "MISSING AI-notice header: $f"
              missing=1
            fi
          done < <(find portauth-engine portauth-issuer sdks state-authority-ref conformance opa portauth-db tests extensions/a2a -type f \
                     \( -name '*.js' -o -name '*.py' -o -name '*.sh' -o -name '*.sql' -o -name '*.rego' \) \
                     -not -path '*/node_modules/*' 2>/dev/null)
          exit "$missing"

  unit-tests:
    name: Unit tests (engine + issuer + preflight)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portauth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portauth
      DB_SSL: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install engine deps
        working-directory: portauth-engine
        run: npm ci || npm install

      - name: Run engine tests
        working-directory: portauth-engine
        run: npm test

      - name: Install issuer deps
        working-directory: portauth-issuer
        run: npm ci || npm install

      - name: Run issuer tests
        working-directory: portauth-issuer
        run: npm test

      - name: Install preflight SDK deps
        working-directory: sdks/preflight
        run: npm install

      - name: Run preflight SDK tests
        working-directory: sdks/preflight
        run: npm test

      - name: Install A2A extension deps
        working-directory: extensions/a2a
        run: npm ci || npm install

      - name: Run A2A extension tests
        working-directory: extensions/a2a
        run: npm test

  conformance:
    name: Conformance vectors
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install engine deps (for evaluator)
        working-directory: portauth-engine
        run: npm ci || npm install

      - name: Run conformance corpus
        working-directory: conformance
        run: node run-conformance.js

  e2e-smoke:
    name: End-to-end smoke (docker compose)
    runs-on: ubuntu-latest
    needs: unit-tests
    services: {}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python (for jq alternative + curl pipeline)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Bring up the compose stack
        run: docker compose -f portauth-docker-compose.yml up -d --build

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/health \
                && curl -sf http://localhost:3200/health; then
              echo "services healthy"
              exit 0
            fi
            sleep 2
          done
          echo "services never became healthy"
          docker compose -f portauth-docker-compose.yml logs --tail=200
          exit 1

      - name: Run end-to-end smoke
        env:
          ISSUER_URL: http://localhost:3100
          ENGINE_URL: http://localhost:3200
          ISSUER_ID_FOR_ENGINE: http://portauth-issuer:3100
          ISSUER_JWKS_URI: http://portauth-issuer:3100/.well-known/jwks.json
        run: ./portauth-engine/test/e2e-smoke.sh

      - name: Run A2A reference smoke
        env:
          ISSUER_URL: http://localhost:3100
          ENGINE_URL: http://localhost:3200
          A2A_RECEIVER_URL: http://localhost:3300
          ISSUER_ID_FOR_ENGINE: http://portauth-issuer:3100
        run: |
          cd extensions/a2a
          npm ci || npm install
          # Mint an ephemeral, non-placeholder receiver token so the secret guard
          # accepts it and the real bearer path is exercised end-to-end. The
          # presenter reads A2A_RECEIVER_BEARER_TOKEN from the environment.
          export A2A_RECEIVER_BEARER_TOKEN="$(openssl rand -hex 16)"
          PORT=3300 ENGINE_URL=http://localhost:3200 A2A_RECEIVER_AUTH_MODE=bearer A2A_RECEIVER_BEARER_TOKEN="$A2A_RECEIVER_BEARER_TOKEN" node reference-receiver/src/server.js > /tmp/portauth-a2a-receiver.log 2>&1 &
          receiver_pid=$!
          trap 'kill "$receiver_pid" >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3300/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3300/health >/dev/null
          node reference-presenter/src/send-bill-payment.js allow
          node reference-presenter/src/send-bill-payment.js deny-amount

      - name: Run A2A TLS reference smoke
        env:
          ISSUER_URL: http://localhost:3100
          ENGINE_URL: http://localhost:3200
          ISSUER_ID_FOR_ENGINE: http://portauth-issuer:3100
          A2A_RECEIVER_BEARER_TOKEN: dev-a2a-receiver-token-change-me
        run: |
          cd extensions/a2a
          npm run tls:cert
          cd ../..
          docker compose -f portauth-docker-compose.yml -f extensions/a2a/docker-compose.tls.yml up -d --build a2a-nginx
          for i in $(seq 1 30); do
            if curl -sf --cacert extensions/a2a/tls/localhost.crt https://localhost:3443/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf --cacert extensions/a2a/tls/localhost.crt https://localhost:3443/health >/dev/null
          curl -sf --cacert extensions/a2a/tls/localhost.crt https://localhost:3443/.well-known/agent-card.json >/dev/null
          cd extensions/a2a
          NODE_EXTRA_CA_CERTS="$PWD/tls/localhost.crt" \
          A2A_RECEIVER_URL=https://localhost:3443 \
          node reference-presenter/src/send-bill-payment.js allow
          NODE_EXTRA_CA_CERTS="$PWD/tls/localhost.crt" \
          A2A_RECEIVER_URL=https://localhost:3443 \
          node reference-presenter/src/send-bill-payment.js deny-amount

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f portauth-docker-compose.yml -f extensions/a2a/docker-compose.tls.yml logs --tail=400
          if [[ -f /tmp/portauth-a2a-receiver.log ]]; then
            echo "== A2A receiver log =="
            cat /tmp/portauth-a2a-receiver.log
          fi

      - name: Tear down compose
        if: always()
        run: docker compose -f portauth-docker-compose.yml -f extensions/a2a/docker-compose.tls.yml down -v

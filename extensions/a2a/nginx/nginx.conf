#
# Local TLS reverse proxy for the PortAuth A2A reference receiver. This file is
# for development and demonstration; production deployments should use
# organization-approved TLS termination, certificate rotation, logging, and
# access-control controls.

server {
  listen 443 ssl;
  http2 on;
  server_name localhost;

  ssl_certificate /etc/nginx/tls/localhost.crt;
  ssl_certificate_key /etc/nginx/tls/localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 512k;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-Port $server_port;
  proxy_set_header X-Real-IP $remote_addr;

  location / {
    proxy_pass http://a2a-reference-receiver:3300;
  }
}
